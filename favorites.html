    <style>
      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 8px;
        margin: 24px 0px;
      }

      .grid2 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 16px;
        margin: 24px 0px;
      }

      .farming {
        grid-row: 1 / span 2;
        height: 800px;
      }

      .test {
        height: 500px;
      }

      .test2 {
        grid-area: 2 / span 2;
        height: 500px;
        width: 100%;
      }

      .test3 {
        height: 450px;
      }

      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
